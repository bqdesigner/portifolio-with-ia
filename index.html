<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bruno Queiros — Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 32px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border: 1.5px solid #e5e5e5;
      border-radius: 14px;
      text-decoration: none;
      color: #111111;
      transition: border-color 200ms ease, box-shadow 200ms ease, transform 150ms ease;
    }

    .card:hover {
      border-color: #111111;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 0.9375rem;
      font-weight: 600;
    }

    .card-arrow {
      font-size: 1.1rem;
      color: #999999;
      transition: color 200ms ease, transform 200ms ease;
    }

    .card:hover .card-arrow {
      color: #111111;
      transform: translateX(3px);
    }

    .logo {
      width: 32px;
      height: auto;
      opacity: 0.75;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo_bq.png" alt="BQ" class="logo" />
    <h1>Portfolio em construção</h1>
    <p class="subtitle">Para acessar outros links, veja:</p>

    <a class="card" href="/ia-processo-design">
      <span class="card-title">IA no processo de Design</span>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://www.linkedin.com/in/itsbrunoqueiros/" target="_blank">
      <span class="card-title"> Linkedin </span>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="https://medium.com/@brunoqueiros" target="_blank">
      <span class="card-title"> Medium </span>
      <span class="card-arrow">→</span>
    </a>
    
    <a class="card" href="https://dribbble.com/itsbrunoqueiros" target="_blank">
      <span class="card-title"> Dribbble </span>
      <span class="card-arrow">→</span>
    </a>

  </div>
</body>
</html>
